{% extends 'base.html' %}
{% block title %}{{ 'Editar' if servicio else 'Nuevo' }} Servicio{% endblock %}
{% block content %}
<div class="page-header">
  <h2>📋 {{ 'Editar' if servicio else 'Nuevo' }} Servicio</h2>
</div>

<div class="form-card">
  <form method="post">
    <div class="form-grid">
      <div class="form-group full">
        <label>Nombre *</label>
        <input type="text" name="nombre" value="{{ servicio.nombre if servicio else '' }}" required>
      </div>
      <div class="form-group full">
        <label>Descripción</label>
        <textarea name="descripcion">{{ servicio.descripcion if servicio else '' }}</textarea>
      </div>
      <div class="form-group">
        <label>Duración (minutos) *</label>
        <input type="number" name="duracion_minutos" min="5" step="5"
               value="{{ servicio.duracion_minutos if servicio else 30 }}" required>
      </div>
      <div class="form-group">
        <label>Precio ($) *</label>
        <input type="number" name="precio" min="0" step="0.01"
               value="{{ servicio.precio if servicio else '' }}" required>
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">💾 Guardar</button>
      <a href="{{ url_for('servicios') }}" class="btn btn-ghost">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
