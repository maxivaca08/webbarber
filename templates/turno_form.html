{% extends 'base.html' %}
{% block title %}{{ 'Editar' if turno else 'Nuevo' }} Turno{% endblock %}
{% block content %}
<div class="page-header">
  <h2>📅 {{ 'Editar' if turno else 'Nuevo' }} Turno</h2>
</div>

<div class="form-card">
  <form method="post">
    <div class="form-grid">
      <div class="form-group">
        <label>Cliente *</label>
        <select name="cliente_id" required>
          <option value="">Seleccionar cliente...</option>
          {% for c in clientes %}
          <option value="{{ c.id }}" {{ 'selected' if turno and turno.cliente_id==c.id }}>
            {{ c.nombre }}
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Barbero *</label>
        <select name="barbero_id" required>
          <option value="">Seleccionar barbero...</option>
          {% for b in barberos %}
          <option value="{{ b.id }}" {{ 'selected' if turno and turno.barbero_id==b.id }}>
            {{ b.nombre }}
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Servicio *</label>
        <select name="servicio_id" required id="servicio-select">
          <option value="">Seleccionar servicio...</option>
          {% for s in servicios %}
          <option value="{{ s.id }}"
                  data-duracion="{{ s.duracion_minutos }}"
                  data-precio="{{ s.precio }}"
                  {{ 'selected' if turno and turno.servicio_id==s.id }}>
            {{ s.nombre }} — {{ s.duracion_minutos }}min — ${{ "%.0f"|format(s.precio) }}
          </option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>Fecha y hora *</label>
        <input type="datetime-local" name="fecha_hora" required
               value="{{ turno.fecha_hora[:16] if turno else '' }}"
               min="{{ '' }}">
      </div>
      {% if turno %}
      <div class="form-group">
        <label>Estado</label>
        <select name="estado">
          <option value="pendiente"  {{ 'selected' if turno.estado=='pendiente' }}>⏳ Pendiente</option>
          <option value="confirmado" {{ 'selected' if turno.estado=='confirmado' }}>✅ Confirmado</option>
          <option value="completado" {{ 'selected' if turno.estado=='completado' }}>🏁 Completado</option>
          <option value="cancelado"  {{ 'selected' if turno.estado=='cancelado' }}>❌ Cancelado</option>
        </select>
      </div>
      {% endif %}
      <div class="form-group full">
        <label>Notas</label>
        <textarea name="notas" placeholder="Observaciones, pedidos especiales...">{{ turno.notas if turno else '' }}</textarea>
      </div>
    </div>

    <div id="resumen" style="display:none;background:var(--surface2);border:1px solid var(--border);
         border-radius:8px;padding:14px 16px;margin-top:16px;font-size:14px;color:var(--text-muted)">
      ⏱ Duración: <strong id="res-dur">—</strong> &nbsp;|&nbsp;
      💲 Precio: <strong id="res-precio">—</strong>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary">💾 Guardar turno</button>
      <a href="{{ url_for('turnos') }}" class="btn btn-ghost">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}

{% block scripts %}
<script>
const sel = document.getElementById('servicio-select');
const resumen = document.getElementById('resumen');

function updateResumen() {
  const opt = sel.options[sel.selectedIndex];
  if (!opt.value) { resumen.style.display = 'none'; return; }
  document.getElementById('res-dur').textContent = opt.dataset.duracion + ' min';
  document.getElementById('res-precio').textContent = '$' + parseInt(opt.dataset.precio).toLocaleString('es-AR');
  resumen.style.display = 'block';
}

sel.addEventListener('change', updateResumen);
updateResumen();
</script>
{% endblock %}
