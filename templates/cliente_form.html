{% extends 'base.html' %}
{% block title %}{{ 'Editar' if cliente else 'Nuevo' }} Cliente{% endblock %}
{% block content %}
<div class="page-header">
  <h2>👤 {{ 'Editar' if cliente else 'Nuevo' }} Cliente</h2>
</div>

<div class="form-card">
  <form method="post">
    <div class="form-grid">
      <div class="form-group">
        <label>Nombre *</label>
        <input type="text" name="nombre" value="{{ cliente.nombre if cliente else '' }}" required>
      </div>
      <div class="form-group">
        <label>Apellido *</label>
        <input type="text" name="apellido" value="{{ cliente.apellido if cliente else '' }}" required>
      </div>
      <div class="form-group">
        <label>Teléfono</label>
        <input type="tel" name="telefono" value="{{ cliente.telefono if cliente else '' }}">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" value="{{ cliente.email if cliente else '' }}">
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">💾 Guardar</button>
      <a href="{{ url_for('clientes') }}" class="btn btn-ghost">Cancelar</a>
    </div>
  </form>
</div>
{% endblock %}
